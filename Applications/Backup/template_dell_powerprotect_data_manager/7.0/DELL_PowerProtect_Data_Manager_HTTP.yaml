          master_item:
            key: dell.ppdm.alerts
          tags:
            - tag: component
              value: alert
          triggers:
            - uuid: 0017d29f67ce45d5b59beedca811e083
              expression: 'length(last(/DELL PowerProtect Data Manager by HTTP/dell.ppdm.total.active.alerts))<>0'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'nodata(/DELL PowerProtect Data Manager by HTTP/dell.ppdm.total.active.alerts,1h)=1 or length(last(/DELL PowerProtect Data Manager by HTTP/dell.ppdm.total.active.alerts))=0'
              name: 'PPDM: New Active Alerts'
              priority: INFO
              description: 'Current critical Alerts on PowerProtect Data Manager'
              manual_close: 'YES'
              dependencies:
                - name: 'PPDM: New Active Critical Alerts'
                  expression: 'length(last(/DELL PowerProtect Data Manager by HTTP/dell.ppdm.critical.active.alerts))<>0'
                  recovery_expression: 'nodata(/DELL PowerProtect Data Manager by HTTP/dell.ppdm.critical.active.alerts,1h)=1 or length(last(/DELL PowerProtect Data Manager by HTTP/dell.ppdm.critical.active.alerts))=0'
                - name: 'PPDM: New Active Informational Alerts'
