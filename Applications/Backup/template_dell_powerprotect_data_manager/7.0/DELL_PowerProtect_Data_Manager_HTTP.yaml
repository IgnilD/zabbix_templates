        - uuid: fe87d94b62234b4eb9e489618a56a150
          name: 'PPDM: Warning Active Summary'
          type: DEPENDENT
          key: dell.ppdm.warning.active.alerts
          delay: '0'
          value_type: TEXT
          trends: '0'
          preprocessing:
