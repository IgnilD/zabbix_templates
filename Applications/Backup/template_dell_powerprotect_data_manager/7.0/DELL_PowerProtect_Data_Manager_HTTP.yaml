              manual_close: 'YES'
              tags:
                - tag: scope
                  value: availability
        - uuid: 56592e528df7439eb8eea4fdf940c2c6
          name: 'PPDM: API service is running'
          type: SIMPLE
          key: 'net.tcp.service[https,,8443]'
          history: 1w
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: network
          triggers:
            - uuid: 86afb9a841304fd6a9f5d3dce5a9a79f
              expression: 'max(/DELL PowerProtect Data Manager by HTTP/net.tcp.service[https,,8443],#3)=0'
              name: 'API service is down on {HOST.NAME}'
              priority: AVERAGE
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: availability
      tags:
        - tag: class
          value: backup
        - tag: target
          value: 'data manager'
        - tag: target
          value: dell
        - tag: target
          value: 'power protect'
