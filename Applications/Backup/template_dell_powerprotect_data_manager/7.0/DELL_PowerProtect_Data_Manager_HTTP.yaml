zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: a571c0d144b14fd4a87a9d9b2aa9fcd6
      name: Templates/Applications
  templates:
    - uuid: febde0c5ff9e4ff19df1cb517adebd87
      template: 'DELL PowerProtect Data Manager by HTTP'
      name: 'DELL PowerProtect Data Manager by HTTP'
      groups:
        - name: Templates/Applications
      items:
        - uuid: f7f91c90908d4be18d6fba7efb51b72d
          name: 'PPDM: Active Alerts'
          type: SCRIPT
          key: dell.ppdm.alerts
          delay: 5m
          history: '0'
          value_type: TEXT
          trends: '0'
          params: |
            var base     = '{$API.URL}';
            var username = '{$API.USERNAME}';
            var password = '{$API.PASSWORD}';
            
            try {
                // Step 1 - Login
                var loginReq = new HttpRequest();
                loginReq.addHeader('Content-Type: application/json');
            
                var loginResp = loginReq.post(
                    base + '/api/v2/login',
                    JSON.stringify({ username: username, password: password })
                );
            
                var token = JSON.parse(loginResp).access_token;
            
                // Step 2 - Get unacknowledged alerts
                var alertReq = new HttpRequest();
                alertReq.addHeader('Content-Type: application/json');
                alertReq.addHeader('Authorization: Bearer ' + token);
            
                var filter = 'acknowledgement.acknowledgeState%20eq%20%22UNACKNOWLEDGED%22';
            
                var alertResp = alertReq.get(
                    base + '/api/v2/alerts?pageSize=100&filter=' + filter
                );
            
                var data = JSON.parse(alertResp);
                var alerts = data.content;
            
                // Count and format by severity
                var critical      = 0;
                var warning       = 0;
                var informational = 0;
            
                var criticalList      = [];
                var warningList       = [];
                var informationalList = [];
            
                for (var i = 0; i < alerts.length; i++) {
                    var sev  = alerts[i].severity.toUpperCase();
                    var msg  = alerts[i].message;
                    var time = alerts[i].postedTime;
            
                    var line = time + ' | ' + sev + ' | ' + msg;
            
                    if (sev === 'CRITICAL') {
                        critical++;
                        criticalList.push(line);
                    } else if (sev === 'WARNING') {
                        warning++;
                        warningList.push(line);
                    } else if (sev === 'INFORMATIONAL') {
                        informational++;
                        informationalList.push(line);
                    }
                }
            
                // Full summary sorted: critical first, then warning, then informational
                var allFormatted = criticalList
                    .concat(warningList)
                    .concat(informationalList)
                    .join('\n');
            
                return JSON.stringify({
                    total: data.page.totalElements,
                    critical: critical,
                    warning: warning,
                    informational: informational,
                    critical_summary: criticalList.join('\n'),
                    warning_summary: warningList.join('\n'),
                    informational_summary: informationalList.join('\n'),
                    full_summary: allFormatted
                });
            
            } catch (e) {
                throw 'PPDM script error: ' + e;
            }
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          timeout: 30s
          tags:
            - tag: component
              value: alert
        - uuid: 9ae3682b6c27477e9d20b50c45125e08
          name: 'PPDM: Critical Active Alerts'
          type: DEPENDENT
          key: dell.ppdm.critical.active.alerts
          delay: '0'
          value_type: TEXT
          trends: '0'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.critical_summary
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          master_item:
            key: dell.ppdm.alerts
          tags:
            - tag: component
              value: alert
          triggers:
            - uuid: ea4caa9abecc4409b08576064da3cab2
              expression: 'length(last(/DELL PowerProtect Data Manager by HTTP/dell.ppdm.critical.active.alerts))<>0'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'nodata(/DELL PowerProtect Data Manager by HTTP/dell.ppdm.critical.active.alerts,1h)=1 or length(last(/DELL PowerProtect Data Manager by HTTP/dell.ppdm.critical.active.alerts))=0'
              name: 'PPDM: New Active Critical Alerts'
              priority: WARNING
              description: 'Current critical Alerts on PowerProtect Data Manager'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: availability
        - uuid: df05bbdfd4c04b1880a654db35aae71a
          name: 'PPDM: Informational Active Alerts'
          type: DEPENDENT
          key: dell.ppdm.informational.active.alerts
          delay: '0'
          value_type: TEXT
          trends: '0'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.informational_summary
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          master_item:
