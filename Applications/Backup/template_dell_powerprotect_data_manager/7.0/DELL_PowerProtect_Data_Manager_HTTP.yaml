            - uuid: 27697f62123048faad8315ebf545701e
              expression: 'length(last(/DELL PowerProtect Data Manager by HTTP/dell.ppdm.informational.active.alerts))<>0'
              recovery_mode: RECOVERY_EXPRESSION
