          triggers:
            - uuid: 90d701822b544ea3ac5fb65a692c4db7
              expression: 'length(last(/DELL PowerProtect Data Manager by HTTP/dell.ppdm.warning.active.alerts))<>0'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'nodata(/DELL PowerProtect Data Manager by HTTP/dell.ppdm.warning.active.alerts,1h)=1 or length(last(/DELL PowerProtect Data Manager by HTTP/dell.ppdm.warning.active.alerts))=0'
              name: 'PPDM: New Active Warning Alerts'
